name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show files
        run: find . -maxdepth 3 | sort

      - name: List schemes
        run: xcodebuild -list -project siop/SIoP.xcodeproj

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project siop/SIoP.xcodeproj

      - name: Build app
        run: |
          set -o pipefail
          xcodebuild \
            -project siop/SIoP.xcodeproj \
            -scheme SIoP \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild.log

      - name: Show Swift errors
        if: failure()
        run: |
          grep -n "error:" xcodebuild.log || true
          grep -n "SwiftCompile" xcodebuild.log || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
