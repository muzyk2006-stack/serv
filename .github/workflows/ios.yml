name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repo structure
        run: find . -maxdepth 3 | sort

      - name: List schemes
        run: xcodebuild -list -project siop/SIoP.xcodeproj

      - name: Build
        run: |
          xcodebuild \
            -project siop/SIoP.xcodeproj \
            -scheme SIoP \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build
