name: iOS Build + Screenshot

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project siop/SIoP.xcodeproj

      - name: Build app
        run: |
          set -o pipefail
          xcodebuild \
            -project siop/SIoP.xcodeproj \
            -scheme SIoP \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            CODE_SIGNING_ALLOWED=NO \
            build | tee build.log

      - name: Boot simulator
        run: |
          xcrun simctl shutdown all || true
          xcrun simctl boot "iPhone 16" || true
          xcrun simctl bootstatus "iPhone 16" -b

      - name: Find app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "SIoP.app" | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "$APP_PATH"

      - name: Install app
        run: |
          xcrun simctl install booted "$APP_PATH"

      - name: Get bundle identifier
        run: |
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          echo "BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV
          echo "$BUNDLE_ID"

      - name: Launch app
        run: |
          xcrun simctl launch booted "$BUNDLE_ID"
          sleep 8

      - name: Take screenshot
        run: |
          mkdir -p screenshots
          xcrun simctl io booted screenshot screenshots/home.png

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshot
          path: screenshots

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
